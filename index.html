<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Viratti Pudi - Indian Street Runner</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      
      <!-- UI Layer -->
      <div id="ui-layer">
        
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
          <div class="glass-panel">
            <h1>VIRATTI PUDI</h1>
            <p class="subtitle">Indian Street Runner</p>
            <p class="instructions">Use ⬅️ ➡️ to steer.<br>Don't let the dogs catch you!</p>
            
            <button id="start-btn" class="primary-btn">START RIDING</button>
            <button id="settings-btn" class="secondary-btn" style="margin-top: 15px; width: 100%;">SETTINGS</button>
          </div>
        </div>

        <!-- Settings Screen -->
        <div id="settings-screen" class="screen">
          <div class="glass-panel">
            <h2>SETTINGS</h2>
            
            <div class="customization">
              <div class="input-group">
                <label for="theme-selector">Theme</label>
                <select id="theme-selector" class="styled-select">
                  <option value="city_day">Indian City (Day)</option>
                  <option value="city_night">Indian City (Night)</option>
                  <option value="village">Village (Dirt Road)</option>
                  <option value="highway">Highway Run</option>
                </select>
              </div>
              
              <div class="input-group">
                <label for="player-model">Player Model</label>
                <select id="player-model" class="styled-select">
                  <option value="man">Local Boy</option>
                  <option value="woman">Local Girl</option>
                  <option value="delivery">Delivery Guy</option>
                </select>
              </div>

              <div class="input-group">
                <label for="face-upload">Player Face (Optional)</label>
                <div class="upload-wrapper">
                  <input type="file" id="face-upload" accept="image/*" class="styled-file">
                  <button id="clear-face-btn" class="secondary-btn" style="display:none;">Clear</button>
                </div>
              </div>
              
              <div class="input-group">
                <label for="dog-model">Dog Model</label>
                <select id="dog-model" class="styled-select">
                  <option value="brown">Brown Street Dog</option>
                  <option value="black">Black Dog</option>
                  <option value="spotted">Spotted Stray</option>
                </select>
              </div>

              <div class="input-group">
                <label for="dog-upload">Dog Face (Optional)</label>
                <div class="upload-wrapper">
                  <input type="file" id="dog-upload" accept="image/*" class="styled-file">
                  <button id="clear-dog-btn" class="secondary-btn" style="display:none;">Clear</button>
                </div>
              </div>
            </div>

            <button id="close-settings-btn" class="primary-btn">BACK</button>
          </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="screen">
          <div class="hud-item score-display">
            <span class="label">DISTANCE</span>
            <div><span id="score">0</span><span class="unit">m</span></div>
          </div>
          
          <div class="hud-item speed-display" style="margin-left: 15px;">
            <span class="label">SPEED</span>
            <div><span id="speed">0</span><span class="unit">km/h</span></div>
          </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
          <div class="glass-panel">
            <h2>WASTED</h2>
            <p class="subtitle">The dogs got you!</p>
            <div class="stats">
              <p>Distance: <span id="final-score">0</span>m</p>
            </div>
            <button id="restart-btn" class="primary-btn">TRY AGAIN</button>
          </div>
        </div>
        
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
